name: Build APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🏗️ Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE="${{ inputs.profile || 'preview' }}"
          echo "Building with profile: $PROFILE"
          npx eas build --platform android --profile "$PROFILE" --non-interactive --wait

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcash-pos-apk
          path: ./*.apk
          if-no-files-found: warn
