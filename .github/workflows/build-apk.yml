name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>&1 || true

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_DEBUG: true

      - name: Build debug APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcash-pos-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ github.ref_name }}
          name: "GCash POS ${{ github.ref_name }}"
          body: |
            ## GCash POS

            ### Features
            - 📊 **Dashboard** — Today's total income, Cash In/Out stats, transaction list
            - 💰 **Record Sale** — Log Cash In/Out with auto-fee calculation
            - 📈 **Analytics** — Income tracking: Today, Yesterday, 15 Days, Monthly, Yearly
            - ⚙️ **Fee Settings** — Custom fee tiers for Cash In and Cash Out
            - 🤖 **Telegram Monitoring** — Auto-send daily summaries to Telegram
            - 💾 **Auto Backup** — Automatic backups on every transaction
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
