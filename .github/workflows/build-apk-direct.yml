name: Build APK Direct

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild (generate android folder)
        run: npx expo prebuild --platform android --clean

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=GCashPOS, OU=Dev, O=GCashPOS, L=City, ST=State, C=PH"

      - name: Configure release signing
        run: |
          # Inject signing config into app build.gradle
          cat >> android/app/build.gradle <<'EOF'

          android {
            signingConfigs {
              release {
                storeFile file('release.keystore')
                storePassword 'android'
                keyAlias 'release'
                keyPassword 'android'
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          EOF

      - name: Build release APK (bundled JS)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gcash-pos-apk
          path: android/app/build/outputs/apk/release/*.apk
