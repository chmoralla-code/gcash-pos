name: Build APK Direct

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild (generate android folder)
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle
        run: |
          printf "\n" >> android/gradle.properties
          cat >> android/gradle.properties <<'GRADLE'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
          hermesEnabled=true
          newArchEnabled=true
          GRADLE

      # Release build creates the JS bundle (debug builds skip bundling
      # expecting Metro dev server). The generated build.gradle already
      # signs release builds with the debug.keystore from prebuild.
      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gcash-pos-apk
          path: android/app/build/outputs/apk/release/*.apk
